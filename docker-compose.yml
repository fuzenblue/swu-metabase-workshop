version: '3.8'

services:
  metabase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metabase-workshop
    ports:
      - "3000:3000"
    volumes:
      - metabase-data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_JETTY_PORT: 3000
    restart: unless-stopped

volumes:
  metabase-data:
